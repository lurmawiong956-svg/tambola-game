<!DOCTYPE html>
<html>
<head>
  <title>Tambola</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

  <h1>🎱 TAMBOLA</h1>

  <!-- ══ SCREEN 1: WAITING ══ -->
  <div id="waitScreen">
    <div id="waitMsg">⏳ Waiting for admin to start the game...</div>
  </div>

  <!-- ══ SCREEN 2: BOOKING (tickets available, no timer yet) ══ -->
  <div id="bookingScreen" style="display:none">
    <h2>📋 Available Tickets</h2>
    <p id="ticketInfoPre"></p>
    <div id="ticketListPre" style="max-width:600px;margin:0 auto;"></div>

    <div id="selectionPanelPre" style="display:none">
      <div class="selectionRow">
        <span id="selectionCountPre"></span>
        <input type="text" id="playerNamePre" placeholder="Enter your name">
        <button onclick="bookAllSelected()">✅ Book</button>
        <button class="changeBtn" onclick="clearSelection()">✖</button>
      </div>
    </div>

    <div id="ticketPreviewAreaPre" style="margin-top:16px;"></div>

    <div id="myTicketsSectionPre" style="display:none">
      <h2>My Booked Tickets</h2>
      <div id="myTicketsListPre"></div>
    </div>
  </div>

  <!-- ══ SCREEN 3: COUNTDOWN (timer + booking) ══ -->
  <div id="countdownScreen" style="display:none">
    <div class="countdown-box">
      <div class="countdown-label">Game starts in</div>
      <div id="countdownTimer" class="countdown-number">--</div>
      <div class="countdown-sub">seconds</div>
    </div>

    <h2>📋 Available Tickets</h2>
    <p id="ticketInfoCd"></p>
    <div id="ticketListCd" style="max-width:600px;margin:0 auto;"></div>

    <div id="selectionPanelCd" style="display:none">
      <div class="selectionRow">
        <span id="selectionCountCd"></span>
        <input type="text" id="playerNameCd" placeholder="Enter your name">
        <button onclick="bookAllSelected()">✅ Book</button>
        <button class="changeBtn" onclick="clearSelection()">✖</button>
      </div>
    </div>

    <div id="ticketPreviewAreaCd" style="margin-top:16px;"></div>

    <div id="myTicketsSectionCd" style="display:none">
      <h2>My Booked Tickets</h2>
      <div id="myTicketsListCd"></div>
    </div>

    <div id="winnersSectionCd" style="display:none;background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.25);border-radius:16px;padding:16px 20px;max-width:600px;margin:16px auto;">
      <h2>🏆 Winners</h2>
      <div id="playerWinnersListCd"></div>
    </div>
  </div>

  <!-- ══ SCREEN 4: GAME LIVE ══ -->
  <div id="gameScreen" style="display:none">

    <div class="current-number-box">
      <div class="cnum-label">Current Number</div>
      <div id="currentNumber">-</div>
    </div>

    <div id="myTicketsSection" style="display:none">
      <h2>My Booked Tickets</h2>
      <div id="myTicketsList"></div>
      <br>
      <button onclick="printMyTickets()">🖨️ Print My Tickets</button>
    </div>

    <hr>

    <div id="searchSection">
      <h2>🔍 Search by Name</h2>
      <div class="searchRow">
        <input type="text" id="searchInput" placeholder="Type a name..." oninput="searchTickets()">
        <button class="changeBtn" onclick="clearSearch()">✖</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <h2>Called Numbers</h2>
    <div class="board" id="board"></div>

    <!-- Winners List -->
    <div id="winnersSection" style="display:none;background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.25);border-radius:16px;padding:16px 20px;max-width:600px;margin:24px auto 0;">
      <h2>🏆 Prize Winners</h2>
      <div id="playerWinnersList"></div>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
