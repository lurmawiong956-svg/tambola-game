<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tambola</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>

  <h1>🎱 TAMBOLA</h1>

  <!-- ══ WAITING ══ -->
  <div id="waitScreen">
    <div id="waitMsg">
      ⏳ Waiting for the game to begin&hellip;<br>
      <strong>Check back soon!</strong>
    </div>
  </div>

  <!-- ══ BOOKING ══ -->
  <div id="bookingScreen" style="display:none">
    <h2>📋 Select Your Tickets</h2>
    <div id="ticketInfoPre" class="info-bar"></div>
    <div id="ticketListPre"></div>
    <div id="ticketPreviewAreaPre" style="margin-top:12px;"></div>
    <div id="myTicketsSectionPre" style="display:none">
      <h2>My Booked Tickets</h2>
      <div id="myTicketsListPre"></div>
    </div>
  </div>

  <!-- ══ COUNTDOWN ══ -->
  <div id="countdownScreen" style="display:none">
    <div class="countdown-box">
      <div class="countdown-label">Game starts in</div>
      <div id="countdownTimer" class="countdown-number">--</div>
      <div class="countdown-sub">seconds</div>
    </div>
    <h2>📋 Select Your Tickets</h2>
    <div id="ticketInfoCd" class="info-bar"></div>
    <div id="ticketListCd"></div>
    <div id="ticketPreviewAreaCd" style="margin-top:12px;"></div>
    <div id="myTicketsSectionCd" style="display:none">
      <h2>My Booked Tickets</h2>
      <div id="myTicketsListCd"></div>
    </div>
    <div id="winnersSectionCd" class="winners-section" style="display:none">
      <h2>🏆 Winners</h2>
      <div id="playerWinnersListCd"></div>
    </div>
  </div>

  <!-- ══ GAME LIVE ══ -->
  <div id="gameScreen" style="display:none">

    <div class="current-number-box">
      <div class="cnum-label">Current Number</div>
      <div id="currentNumber">-</div>
    </div>

    <div style="text-align:center;margin:4px 0 8px;">
      <button id="audioBtn" onclick="toggleAudioCommentary()">🔊 Tap to enable audio</button>
    </div>

    <h2>Called Numbers</h2>
    <div class="board" id="board"></div>

    <hr>

    <div id="myTicketsSection">
      <h2>My Tickets</h2>
      <div id="myTicketsList"></div>
      <button onclick="printMyTickets()" style="margin-top:8px;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:var(--text-dim);">🖨️ Print</button>
    </div>

    <hr>

    <div id="searchSection">
      <h2>🔍 Search by Name</h2>
      <div class="searchRow">
        <input type="text" id="searchInput" placeholder="Search player name…" oninput="searchAndScroll()">
        <button class="changeBtn" onclick="clearSearch()">✖</button>
      </div>
      <div id="searchResults"></div>
    </div>

    <hr>

    <div style="max-width:500px;margin:0 auto;">
      <h2>📋 All Tickets</h2>
      <div id="ticketInfo" class="info-bar" style="justify-content:center;margin-bottom:8px;"></div>
      <div id="ticketList"></div>
    </div>

    <hr>

    <div id="winnersSection" class="winners-section" style="display:none">
      <h2>🏆 Prize Winners</h2>
      <div id="playerWinnersList"></div>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
